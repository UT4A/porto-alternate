<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Portfolio</title>
<style>
body{margin:0;font-family:sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white;text-align:center}
.container{padding:40px}
img{width:120px;border-radius:50%;border:3px solid white}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:30px}
.card{background:rgba(255,255,255,0.1);padding:10px;border-radius:12px;transition:0.3s}
.card:hover{transform:scale(1.05)}
iframe{width:100%;height:200px;border:none;border-radius:10px}
</style>
</head>
<body>
<div class="container">
<img src="https://via.placeholder.com/150">
<h1>Your Name</h1>
<p>Short-form Video Editor</p>

<div class="grid">
<div class="card"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div>
<div class="card"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div>
</div>
</div>
</body>
</html>
