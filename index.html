<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XP Dreamcore Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;cursor:url('https://cur.cursors-4u.net/cursors/cur-2/cur117.cur'), auto;}
body{overflow-x:hidden;color:white;}

.bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2;}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,40,0.5);z-index:-1;backdrop-filter:blur(6px);} 

.window{
 position:absolute;
 background:rgba(200,220,255,0.15);
 border:2px solid rgba(255,255,255,0.3);
 border-radius:12px;
 backdrop-filter:blur(12px);
 box-shadow:0 0 25px rgba(0,150,255,0.6);
 padding:15px;
 width:300px;
}

.title-bar{
 font-weight:bold;
 margin-bottom:10px;
 cursor:move;
 background:linear-gradient(90deg,#4facfe,#00f2fe);
 padding:5px;
 border-radius:6px;
}

.hero{top:60px;left:50%;transform:translateX(-50%);text-align:center;width:320px;}
.hero img{width:100px;height:100px;border-radius:50%;border:3px solid white;margin-bottom:10px;}
.hero h1{text-shadow:0 0 10px cyan;}

.portfolio-window{top:220px;left:50px;width:600px;}
.portfolio{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
.video-card{background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;transition:0.3s;}
.video-card:hover{transform:scale(1.05);box-shadow:0 0 15px cyan;filter:contrast(1.2) saturate(1.2);} 
.video-card iframe{width:100%;height:150px;border:none;}

.about{top:220px;right:50px;width:300px;}
.contact{bottom:40px;left:50%;transform:translateX(-50%);width:300px;}

.glitch{animation:glitch 2s infinite;}
@keyframes glitch{
 0%{text-shadow:2px 0 red;}
 50%{text-shadow:-2px 0 blue;}
 100%{text-shadow:2px 0 red;}
}

</style>
</head>

<body>

<video autoplay muted loop class="bg-video">
<source src="https://cdn.coverr.co/videos/coverr-clouds-over-hills-5176/1080p.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="window hero">
<div class="title-bar">My Computer</div>
<img src="https://via.placeholder.com/150" />
<h1 class="glitch">Your Name</h1>
<p>Short-form Video Editor</p>
</div>

<div class="window portfolio-window">
<div class="title-bar">My Work</div>
<div class="portfolio">
<div class="video-card"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div>
<div class="video-card"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div>
<div class="video-card"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div>
</div>
</div>

<div class="window about">
<div class="title-bar">About Me</div>
<p>I create engaging short-form content with strong storytelling and modern editing style.</p>
</div>

<div class="window contact">
<div class="title-bar">Contact</div>
<p>Email: your@email.com</p>
<p>Instagram | TikTok | YouTube</p>
</div>

<script>
// DRAG FUNCTION
const windows = document.querySelectorAll('.window');

windows.forEach(win => {
 const bar = win.querySelector('.title-bar');
 let offsetX = 0, offsetY = 0, isDown = false;

 bar.addEventListener('mousedown', e => {
  isDown = true;
  offsetX = e.clientX - win.offsetLeft;
  offsetY = e.clientY - win.offsetTop;
 });

 document.addEventListener('mouseup', () => isDown = false);

 document.addEventListener('mousemove', e => {
  if(!isDown) return;
  win.style.left = (e.clientX - offsetX) + 'px';
  win.style.top = (e.clientY - offsetY) + 'px';
 });
});
</script>

</body>
</html>
