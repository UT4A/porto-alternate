<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Editor Portfolio</title>

<style>
:root{
  --bg:#0b1220;
  --card:#121a2b;
  --accent:#4cc9f0;
  --text:#e6edf3;
  --muted:#8b9bb4;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Inter, Arial, sans-serif}
body{background:linear-gradient(120deg,#0b1220,#0f1a2e);color:var(--text)}

.container{max-width:1100px;margin:auto;padding:40px 20px}

/* HEADER */
.header{display:flex;align-items:center;gap:20px;margin-bottom:40px}
.header img{width:80px;height:80px;border-radius:50%;border:2px solid var(--accent)}
.header h1{font-size:28px}
.header p{color:var(--muted)}

/* MAIN VIDEO */
.main-video{background:var(--card);border-radius:16px;padding:15px;margin-bottom:40px;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
.main-video iframe{width:100%;height:400px;border:none;border-radius:10px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:var(--card);border-radius:14px;overflow:hidden;transition:0.25s;cursor:pointer}
.card:hover{transform:translateY(-5px);box-shadow:0 10px 25px rgba(0,0,0,0.6)}
.card iframe{width:100%;height:180px;border:none}

/* ABOUT + CONTACT */
.footer{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:40px}
.box{background:var(--card);padding:20px;border-radius:14px}
.box h3{margin-bottom:10px}
.box p{color:var(--muted);line-height:1.5}

.links a{color:var(--accent);text-decoration:none;margin-right:10px}

/* RESPONSIVE */
@media(max-width:700px){
  .main-video iframe{height:250px}
  .footer{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img src="https://via.placeholder.com/150" />
    <div>
      <h1>Your Name</h1>
      <p>Short-form Video Editor</p>
    </div>
  </div>

  <!-- MAIN VIDEO (HERO) -->
  <div class="main-video">
    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
  </div>

  <!-- PORTFOLIO GRID -->
  <div class="grid">
    <div class="card"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div>
    <div class="card"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div>
    <div class="card"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div>
    <div class="card"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="box">
      <h3>About</h3>
      <p>I create engaging short-form content focused on retention, pacing, and modern editing style for social media.</p>
    </div>

    <div class="box">
      <h3>Contact</h3>
      <p>Email: your@email.com</p>
      <div class="links">
        <a href="#">Instagram</a>
        <a href="#">TikTok</a>
        <a href="#">YouTube</a>
      </div>
    </div>
  </div>

</div>
</body>
</html>
