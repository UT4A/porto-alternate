<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XP Dreamcore</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{overflow:hidden;color:white}

video{position:fixed;width:100%;height:100%;object-fit:cover;z-index:-2}
.overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px)}

.window{position:absolute;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:10px;padding:10px;backdrop-filter:blur(10px)}
.title{background:linear-gradient(90deg,#00c6ff,#0072ff);padding:5px;border-radius:5px;margin-bottom:5px;cursor:move}

.hero{top:50px;left:50%;transform:translateX(-50%);text-align:center}
.hero img{width:90px;border-radius:50%;border:2px solid white}

.work{top:200px;left:40px;width:400px}
.about{top:200px;right:40px;width:250px}
.contact{bottom:60px;left:50%;transform:translateX(-50%)}

iframe{width:100%;height:120px;border:none}

.taskbar{position:fixed;bottom:0;width:100%;height:40px;background:linear-gradient(90deg,#245edb,#3a8dde);display:flex;align-items:center;padding:0 10px}
.start{background:#2ecc71;padding:5px 10px;border-radius:5px}

.icon{position:absolute;text-align:center}
.icon img{width:40px}

</style>
</head>
<body>

<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-clouds-over-hills-5176/1080p.mp4">
</video>
<div class="overlay"></div>

<div class="icon" style="top:100px;left:20px">
<img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
<p>My Work</p>
</div>

<div class="window hero">
<div class="title">My Computer</div>
<img src="https://via.placeholder.com/150">
<h2>Your Name</h2>
<p>Video Editor</p>
</div>

<div class="window work">
<div class="title">My Work</div>
<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</div>

<div class="window about">
<div class="title">About</div>
<p>Short-form editor with modern storytelling.</p>
</div>

<div class="window contact">
<div class="title">Contact</div>
<p>Email: your@email.com</p>
</div>

<div class="taskbar">
<div class="start">Start</div>
</div>

<script>
const wins=document.querySelectorAll('.window');
wins.forEach(w=>{
let isDown=false,offX,offY;
const bar=w.querySelector('.title');
bar.onmousedown=e=>{isDown=true;offX=e.clientX-w.offsetLeft;offY=e.clientY-w.offsetTop}
document.onmouseup=()=>isDown=false
document.onmousemove=e=>{if(!isDown)return;w.style.left=e.clientX-offX+'px';w.style.top=e.clientY-offY+'px'}
})
</script>

</body>
</html>
